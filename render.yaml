services:
  - type: web
    name: doodle-io
    runtime: node
    plan: free
    buildCommand: cd web && npm install && npm run build && cd ../server && npm install && npm run build
    startCommand: cd server && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: CLIENT_ORIGIN
        value: "*"
      - key: RECONNECT_GRACE_MS
        value: "120000"
